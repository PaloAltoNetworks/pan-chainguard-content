name: Update Chainguard Content

on:
  workflow_dispatch:
  schedule:
    - cron: "00 11 * * *" # once a day at 11:00 UTC / 6:00 EST

permissions: {}

concurrency:
  group: update-content
  cancel-in-progress: false

jobs:
  build:
    if: github.repository == 'PaloAltoNetworks/pan-chainguard-content'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: checkout repo content
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: setup python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.x" # install the python version needed

      - name: install python packages
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: download pan-chainguard
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: "PaloAltoNetworks/pan-chainguard"
          path: pan-chainguard
          persist-credentials: false

      - name: Clean Up
        run: |
          mv latest-certs old-certs

      - name: Download DBs
        run: |
          curl -sOJ --create-dirs --output-dir latest-certs --write-out "%{filename_effective}\n" https://ccadb.my.salesforce-sites.com/ccadb/AllCertificateRecordsCSVFormatv4
          curl -sOJ --output-dir latest-certs --write-out "%{filename_effective}\n" https://ccadb.my.salesforce-sites.com/mozilla/MozillaIntermediateCertsCSVReport
          curl -sOJ --output-dir latest-certs --write-out "%{filename_effective}\n" https://ccadb.my.salesforce-sites.com/mozilla/PublicAllIntermediateCertsWithPEMCSV
          curl -sOJ --output-dir latest-certs --write-out "%{filename_effective}\n" https://ccadb.my.salesforce-sites.com/mozilla/IntermediateCertsInOneCRLReportCSV
          curl -sOJ --output-dir latest-certs --write-out "%{filename_effective}\n" https://ccadb.my.salesforce-sites.com/ccadb/AllIncludedRootCertsCSV

      - name: Sprocket
        run: |
          cp old-certs/policy.json latest-certs/policy.json
          pan-chainguard/bin/sprocket.py --verbose \
            --ccadb latest-certs/AllCertificateRecordsReport.csv \
            --trust-settings latest-certs/AllIncludedRootCertsCSV.csv \
            --fingerprints latest-certs/root-fingerprints.csv \
            --policy old-certs/policy.json

      - name: Chain
        run: |
          pan-chainguard/bin/chain.py --verbose \
            -c latest-certs/AllCertificateRecordsReport.csv \
            -r latest-certs/root-fingerprints.csv \
            -o latest-certs/IntermediateCertsInOneCRL.csv \
            -i latest-certs/intermediate-fingerprints.csv \
            --tree latest-certs/certificate-tree.json

      - name: Chainring to HTML
        run: |
          pan-chainguard/bin/chainring.py --verbose \
            --title 'Root Store: Union of Mozilla, Apple, Chrome, Microsoft' \
            --test-collisions \
            --tree latest-certs/certificate-tree.json --format html > index.html

      - name: Link
        run: |
          set +e   # disable immediate exit on error
          pan-chainguard/bin/link.py --verbose \
            -f latest-certs/root-fingerprints.csv \
            -f latest-certs/intermediate-fingerprints.csv \
            -m latest-certs/MozillaIntermediateCerts.csv \
            -m latest-certs/PublicAllIntermediateCertsWithPEMReport.csv \
            --certs-old old-certs/certificates-new.tgz \
            --certs-new latest-certs/certificates-new.tgz
          status=$?
          set -e   # re-enable "exit on error" for the rest of the step
          if [ "$status" -ne 0 ] && [ "$status" -ne 2 ]; then
            echo "link.py failed with exit code: $status"
            exit $status
          fi

      - name: commit files
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A latest-certs/*
          git add -A index.html
          git diff-index --quiet HEAD || (git commit -a -m "updated files" --allow-empty)

      - name: push changes
        run: |
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
